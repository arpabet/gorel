name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Keep go.arpabet.com modules off Google's public module proxy/checksum DB:
# GOPRIVATE expands to GONOPROXY + GONOSUMDB, so these modules are fetched
# directly from source and not cached by proxy.golang.org / sum.golang.org.
env:
  GOPRIVATE: go.arpabet.com/*

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -cover ./...

      - name: Build
        run: make build
